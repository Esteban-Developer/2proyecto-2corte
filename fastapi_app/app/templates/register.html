{% extends "base.html" %}

{% block content %}

<div class="breacrumb-section">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="breadcrumb-text">
          <a href="/"><i class="fa fa-home"></i> Inicio</a>
          <span>Registro</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="register-login-section spad">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-6 offset-lg-3">
        <div class="register-form">
          <h2>Crear Cuenta</h2>
          <form action="/register" method="post" enctype="multipart/form-data" id="logform">
            <div class="row">
              <div class="group-input col-md-6">
                <label for="username">Nombre completo *</label>
                <input type="text" id="username" name="name" required>
                <div id="nameerr" style="margin:20px 0"></div>
              </div>
              <div class="group-input col-md-6">
                <label for="con">Teléfono *</label>
                <input type="text" id="con" name="contact" required>
                <div id="conerr" style="margin:20px 0"></div>
              </div>
            </div>
            <div class="group-input">
              <label for="email">Correo electrónico *</label>
              <input type="text" id="eemail" name="cemail" required>
              <div id="eerr" style="margin:20px 0"></div>
            </div>
            <div class="group-input">
              <label for="pass">Contraseña *</label>
              <input type="password" id="pass" name="password" required>
            </div>
            <div class="group-input">
              <label for="address">Dirección *</label>
              <input type="text" id="address" name="address" required>
            </div>
            <div class="group-input">
              <label for="pimage">Imagen de perfil *</label>
              <input type="file" id="pimage" name="pimage" style="border: none; margin-top:6px;" required>
            </div>
            <button type="submit" class="site-btn register-btn" name="register">REGISTRARME</button>
          </form>
          <div class="switch-login">
            <a href="/login" class="or-login">¿Ya tienes una cuenta? Inicia sesión</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  $("#logform").submit(function(event) {
    var name = $('#username').val();
    var email = $('#eemail').val();
    var con = $('#con').val();

    var letters = /^[A-Za-z\\s]+$/;
    var em = /\\S+@\\S+\\.\\S+/;
    var numbers = /^[0-9]{10,11}$/;

    if (!name.match(letters)) {
      $("#nameerr").html("<span class='alert alert-danger'>Por favor ingrese un nombre válido (solo letras).</span>");
      event.preventDefault();
    }

    if (!con.match(numbers)) {
      $("#conerr").html("<span class='alert alert-danger'>Ingrese un número de teléfono válido (10 o 11 dígitos).</span>");
      event.preventDefault();
    }

    if (!email.match(em)) {
      $("#eerr").html("<span class='alert alert-danger'>Ingrese un correo electrónico válido.</span>");
      event.preventDefault();
    }
  });
</script>
{% endblock %}
