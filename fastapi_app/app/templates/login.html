{% extends "base.html" %}

{% block content %}

<div class="breacrumb-section">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="breadcrumb-text">
          <a href="/"><i class="fa fa-home"></i> Inicio</a>
          <span>Iniciar Sesión</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="register-login-section spad">
  <div class="container">
    <div class="row">
      <div class="col-lg-6 offset-lg-3">
        <div class="login-form">
          <h2>Iniciar Sesión</h2>
          <form action="/login" method="post">
            <div class="group-input">
              <label for="correo">Correo electrónico *</label>
              <input type="text" id="correo" name="correo_cliente" required>
              <div id="error_correo"></div>
            </div>
            <div class="group-input">
              <label for="clave">Contraseña *</label>
              <input type="password" id="clave" name="clave_cliente" required>
              <div id="error_clave"></div>
            </div>
            <button name="iniciar_sesion" class="site-btn login-btn">Ingresar</button>
          </form>
          <div class="switch-login">
            <a href="/register" class="or-login">¿No tienes cuenta? Crea una aquí</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
